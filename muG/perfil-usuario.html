<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página oficial de Bog-Boost">
    <title>Perfil de usuario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,1,0" rel="stylesheet" />
    <link href="../muG/assets/css/general.css" rel="stylesheet" type="text/css"/>
    <link href="../muG/assets/css/recuperar-contraseña.css" rel="stylesheet" type="text/css"/>
    <link href="../muG/assets/css/perfil-usuario.css" rel="stylesheet" type="text/css"/>
    <script src="../muG/assets/javascript/general.js" defer></script>
</head>
<body class="G-body">
    <nav class="G-nav">
        <div class="G-logo">
            <img src="../muG/assets/images/logo.png" alt="logo" width="105px" height="60px">
        </div>
        <div class="G-centro">
            <div class="G-nav-buttons">
                <a href="">Inicio</a>
                <a href="">Catálogo</a>
                <a href="../muG/negocios.html">Negocios</a>
            </div>
            <div class="G-contenedor-buscador">
                <div class="G-buscador">
                    <input id="G-buscador-input" type="search">
                    <button class="G-lupa">
                        <span class="material-symbols-outlined">search</span>
                    </button>
                </div>
            </div>
        </div>
        <div class="G-right-buttons">
            <button class="G-campana">
                <span class="material-symbols-outlined">circle_notifications</span>
            </button>
            <div class="G-menu-container">
                <button id="G-menu-btn" type="button" onclick="toggleMenu()">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div id="G-menu-list">
                    <a href="#" class="G-selected-btn">Perfil</a>
                    <a href="../muG/carrito-compras.html">Carrito</a>
                    <a href="../muG/historial-compras.html">Historial</a>
                    <a href="#">Contactenos</a>
                    <a href="#">Cerrar sesión</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="G-main">
        <div>
            <h1>Pefil de usuario</h1>
        </div>
        <section class="G-card-form">
            <div><span class="material-symbols-outlined G-A-C">account_circle</span></div>
            <form method="..." action="...">
                <div>
                    <label for="name"></label>
                    <input class="G-input-form" id="name" type="text" name="Nombre" placeholder="Nombre" required/><br>
                </div>
                <div>
                    <label for="correo"></label>
                    <input class="G-input-form" id="correo" type="email" name="Correo" placeholder="Correo" required/><br>
                </div>
                <div>
                    <label for="tel"></label>
                    <input class="G-input-form" id="tel" type="tel" name="Teléfono" placeholder="Teléfono" required/><br>
                </div>
                <div>
                    <label for="diretion"></label>
                    <input class="G-input-form" id="direction" type="text" name="Direction" placeholder="Dirección" required/><br>
                </div>
                <div class="G-pw-box">
                    <label for="G-new"></label>
                    <input class="G-input-form new-pw" id="G-new" type="password" name="Contraseña" placeholder="Contraseña" required/>
                    <span id="G-ojO" class="material-symbols-outlined G-ojo">visibility</span>
                </div>
                <div class="G-action-buttons">
                    <button type="button" class="G-btn">Editar</button>
                    <button type="button" class="G-btn">Eliminar Perfil</button>
                </div>
            </form>
        </section>
    </main>
    <footer class="G-footer">Derechos de autor &copy; 2025 BOG-BOOST. Todos los derechos reservados.</footer>
</body>
</html>
