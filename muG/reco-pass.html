<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página oficial de Bog-Boost">
    <title>Bog-Boost</title>
    <link href="../muG/assets/css/general.css" rel="stylesheet" type="text/css"/>
    <link href="../muG/assets/css/reco-pass.css" rel="stylesheet" type="text/css"/>
    <script src="../muG/assets/javascript/reco-pass.js" defer></script>
</head>
<body>
    <nav class="nav">
        <img class="logo" src="../muG/assets/images/logo.png" alt="logo" width="105px" height="60px">
        <img class="menu" src="../muG/assets/images/menu.png" alt="menu" width="35px" height="30px">
        <h1>Inicio</h1>
    </nav>
    <section class="recont">
        <h1>Recuperación de contraseña</h1>
        <form method="..." action="...">
            <div>
                <label for="correo"></label>
                <input class="input-form" id="correo" type="email" name="Correo" placeholder="Correo" required/><br>
            </div>
            <div>
                <label for="code"></label>
                <input class="input-form" id="code" type="text" name="Código-verificación" placeholder="Código de verificación" required/><br>
            </div>
            <div class="pw-box">
                <label for="new"></label>
                <input class="input-form new-pw" id="new" type="password" name="nueva-contraseña" placeholder="Nueva contraseña" required/>
                <img src="../muG/assets/images/ojo.png" id="ojO" alt="ojo-pw" class="ojo">
            </div>
            <button type="submit" class="btn">Confirmar</button>
        </form>
    </section>
    <footer>Derechos de autor &copy; 2025 BOG-BOOST. Todos los derechos reservados.</footer>
</body>
</html>
